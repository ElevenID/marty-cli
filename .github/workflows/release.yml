name: Release npm packages

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Validate tag and package versions
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$(node -p "require('./package.json').version")" = "$version"
          test "$(node -p "require('./packages/api-core/package.json').version")" = "$version"
      - run: npm ci
      - run: npm test
      - name: Build release evidence
        run: |
          mkdir -p dist
          npm sbom --sbom-format cyclonedx > dist/marty-cli-sbom.cdx.json
          npm sbom --workspace @elevenid/marty-api-core --sbom-format cyclonedx > dist/marty-api-core-sbom.cdx.json
          npm pack --workspace @elevenid/marty-api-core --pack-destination dist
          npm pack --pack-destination dist
          cd dist && sha256sum ./*.tgz > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: marty-cli-release
          path: dist
          retention-days: 7

  publish-npm:
    if: vars.ENABLE_PUBLIC_REGISTRY_PUBLISHING == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: marty-cli-release
          path: dist
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Publish with npm trusted publishing
        shell: bash
        run: |
          npm publish dist/elevenid-marty-api-core-*.tgz --access public --provenance
          npm publish dist/elevenid-marty-cli-*.tgz --access public --provenance

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: marty-cli-release
          path: dist
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tgz
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/*.tgz
            dist/*sbom*.json
            dist/SHA256SUMS
          generate_release_notes: true
